<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="navbar">
    <div class="logo">🐶 AdoptaPaw</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="available.html">Available Pets</a></li>
      <li><a href="adopt.html">Adopt a Pet</a></li>
      <li><a href="shelterInfo.html">Shelters</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="signup.html" class="active">Sign Up</a></li>
    </ul>
  </div>

  <div class="auth-container">
    <div class="container">
      <h1 style="text-align:center; color:#d6336c;">Sign Up</h1>
    </div>
    <form id="signupForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>
    <p class="message" id="signupMessage"></p>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', function (e) {
      e.preventDefault();
      fetch('http://localhost:5000/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          Name: document.getElementById('name').value,
          Email: document.getElementById('email').value,
          Password: document.getElementById('password').value
        })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('signupMessage').innerText = data.message;
      });
    });
  </script>
  
</body>
</html>
